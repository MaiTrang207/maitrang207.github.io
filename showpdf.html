<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Trình Đọc PDF - Minimalist Matcha</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

<style>
/* --- BẢNG MÀU ĐỒNG BỘ VỚI WEB CHÍNH (TONE MATCHA / MINIMALIST) --- */
:root {
    --bg-color: #f2f5f3; /* Màu nền xanh xám siêu nhạt */
    --primary-text: #2b3a32; /* Xanh lá rêu đậm */
    --secondary-text: #5b6b61; /* Xanh xám */
    --accent-color: #799482; /* Màu xanh Matcha */
    --box-bg: #ffffff; 
    --font-main: 'Segoe UI', Helvetica, Arial, sans-serif;
    --font-heading: 'Georgia', serif; 
}

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: var(--bg-color); /* Đồng bộ nền web chính */
    overflow: hidden;
    font-family: var(--font-main);
    color: var(--primary-text);
}

/* --- THANH CÔNG CỤ (TOOLBAR) - Dạng thanh mảnh, sắc nét --- */
.toolbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    background-color: var(--box-bg);
    border-bottom: 2px solid var(--accent-color);
    z-index: 999;
}

/* Nút bấm vuông vức, đổ bóng cứng phong cách retro/minimalist */
.toolbar button {
    border: 2px solid var(--primary-text);
    background: var(--box-bg);
    color: var(--primary-text);
    font-family: var(--font-main);
    font-weight: 700;
    font-size: 13px;
    padding: 8px 20px;
    border-radius: 0px; /* Bỏ bo góc */
    cursor: pointer;
    transition: all 0.2s ease-in-out;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.toolbar button:hover {
    background: var(--accent-color);
    color: var(--box-bg);
    transform: translate(-3px, -3px);
    box-shadow: 4px 4px 0px var(--primary-text);
}

#pageInfo {
    color: var(--primary-text);
    font-family: var(--font-heading); 
    font-weight: bold;
    min-width: 90px;
    text-align: center;
    font-size: 16px;
    background: transparent;
    padding: 6px 15px;
    border-bottom: 2px solid var(--primary-text);
}

/* --- VÙNG HIỂN THỊ PDF --- */
.swiper {
    width: 100%;
    height: 100%;
    padding-top: 60px;
}

.swiper-slide {
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: auto;
    background: transparent;
    padding: 25px;
    box-sizing: border-box;
}

.pageCanvas {
    max-width: 100%;
    max-height: 100%;
    background: var(--box-bg);
    border-radius: 0px; /* Bỏ bo góc */
    border: 2px solid var(--primary-text);
    /* Đổ bóng khối cứng đồng bộ với thẻ dự án ở web chính */
    box-shadow: 10px 10px 0px var(--accent-color);
}

/* --- KHUNG LOADING KHI ĐANG TẢI --- */
.loading {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--box-bg);
    color: var(--primary-text);
    font-family: var(--font-heading);
    font-style: italic;
    font-size: 1.2rem;
    padding: 20px 40px;
    border: 2px solid var(--primary-text);
    box-shadow: 6px 6px 0px var(--accent-color);
    z-index: 9999;
}

@media(max-width: 768px) {
    .toolbar { height: 55px; gap: 8px; }
    .toolbar button { padding: 6px 12px; font-size: 12px; }
    .swiper { padding-top: 55px; }
    #pageInfo { font-size: 14px; padding: 4px 10px; }
    .pageCanvas { box-shadow: 6px 6px 0px var(--accent-color); }
}
</style>
</head>
<body>

<div class="toolbar">
    <button id="prevBtn">PREV</button>
    <div id="pageInfo">1 / 1</div>
    <button id="nextBtn">NEXT</button>
</div>

<div class="loading" id="loading">
    Đang tải tài liệu...
</div>

<div class="swiper">
    <div class="swiper-wrapper" id="pdfPages"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script type="module">
import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs";

pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs";

// Lấy link PDF từ URL
const urlParams = new URLSearchParams(window.location.search);
let PDF_URL = urlParams.get('file'); 

if (!PDF_URL) {
    PDF_URL = "BT/bai1.pdf"; 
}

const wrapper = document.getElementById("pdfPages");
const loading = document.getElementById("loading");
const pageInfo = document.getElementById("pageInfo");

try {
    const pdf = await pdfjsLib.getDocument({
        url: PDF_URL,
        cMapUrl: "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/cmaps/",
        cMapPacked: true,
        standardFontDataUrl: "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/standard_fonts/"
    }).promise;

    for(let i=1; i<=pdf.numPages; i++){
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: 2 });
        const canvas = document.createElement("canvas");
        
        canvas.className = "pageCanvas";
        canvas.width = viewport.width;
        canvas.height = viewport.height;

        await page.render({
            canvasContext: canvas.getContext("2d"),
            viewport
        }).promise;

        const slide = document.createElement("div");
        slide.className = "swiper-slide";
        slide.appendChild(canvas);
        wrapper.appendChild(slide);
    }

    loading.remove();

    const swiper = new Swiper(".swiper", {
        slidesPerView: 1,
        spaceBetween: 0,
        speed: 400,
        grabCursor: true,
        centeredSlides: true,
        keyboard: { enabled: true },
        mousewheel: true,
        on: {
            slideChange(){
                pageInfo.textContent = `${swiper.activeIndex + 1} / ${pdf.numPages}`;
            }
        }
    });

    pageInfo.textContent = `1 / ${pdf.numPages}`;

    document.getElementById("prevBtn").onclick = () => swiper.slidePrev();
    document.getElementById("nextBtn").onclick = () => swiper.slideNext();

} catch (error) {
    loading.innerHTML = "Không tìm thấy tài liệu.";
    console.error("Lỗi khi tải PDF: ", error);
}

/* Đã gỡ bỏ toàn bộ Javascript tạo hiệu ứng hoa/lá rơi theo yêu cầu */

</script>

</body>
</html>
